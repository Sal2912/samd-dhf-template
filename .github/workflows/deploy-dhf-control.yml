name: Deploy DHF Control UI

# Runs whenever you push to main (inside dhf-control/) or trigger manually
on:
  push:
    branches: [main]
    paths:
      - "dhf-control/**"
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  build-and-deploy:
    name: Build → Push image → SSH deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/sal2912/dhf-control

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build Docker image ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            ./dhf-control

      # ── 3. Push to GitHub Container Registry ─────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in, no setup needed

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      # ── 4. SSH into your server and pull + restart ────────────────────────────
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}       # your server IP or hostname
          username: ${{ secrets.DEPLOY_USER }}       # e.g. ubuntu
          key:      ${{ secrets.DEPLOY_SSH_KEY }}    # private key (no passphrase)
          script: |
            # Pull the latest image
            docker pull ghcr.io/sal2912/dhf-control:latest

            # Stop + remove the old container (if running)
            docker stop dhf-control 2>/dev/null || true
            docker rm   dhf-control 2>/dev/null || true

            # Start fresh — volume at /opt/dhf-data persists the SQLite db
            docker run -d \
              --name dhf-control \
              --restart unless-stopped \
              -p 5000:5000 \
              -v /opt/dhf-data:/data \
              -e JIRA_BASE_URL="${{ secrets.JIRA_BASE_URL }}" \
              -e JIRA_EMAIL="${{ secrets.JIRA_EMAIL }}" \
              -e JIRA_API_TOKEN="${{ secrets.JIRA_API_TOKEN }}" \
              -e JIRA_PROJECT_KEY="${{ secrets.JIRA_PROJECT_KEY }}" \
              -e GITHUB_TOKEN="${{ secrets.DEPLOY_GITHUB_TOKEN }}" \
              -e GITHUB_REPO="Sal2912/samd-dhf-template" \
              ghcr.io/sal2912/dhf-control:latest

            # Quick health check
            sleep 5
            curl -sf http://localhost:5000/api/stats && echo "✅ Deploy healthy" || echo "⚠️ Health check failed"
