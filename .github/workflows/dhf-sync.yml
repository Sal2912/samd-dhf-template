name: DHF Sync Bot

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  dhf-sync:
    name: Claude DHF Sync
    runs-on: ubuntu-latest
    permissions:
      contents: write        # commit updated DHF docs back to PR branch
      issues: write          # open review Issues
      pull-requests: write   # post PR comment

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests pyyaml

      - name: Fetch PR diff
        id: diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>/dev/null | head -c 4000 || echo "")
          echo "PR_DIFF<<EOF" >> $GITHUB_ENV
          echo "$DIFF" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run DHF Sync Bot (Claude Haiku)
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_BODY:           ${{ github.event.pull_request.body }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
        run: python scripts/dhf_sync_bot.py
        continue-on-error: true  # we handle exit codes below

      - name: Commit DHF document updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(dhf): Claude DHF sync from PR #${{ github.event.pull_request.number }} [skip ci]

            Auto-updated by DHF Sync Bot (Claude Haiku).
            Awaiting approval from @Sal2912 before merge.
          file_pattern: "dhf/**/*.md"
          commit_user_name: "GreyZone AI DHF Bot"
          commit_user_email: "bot@greyzone-ai.com"

      - name: Run traceability check
        run: python scripts/check_traceability.py

      - name: Block merge — awaiting reviewer approval
        if: steps.sync.outcome == 'failure'
        run: |
          echo "⏸  Merge blocked. @Sal2912 must comment 'approved' on the DHF review Issue."
          exit 1
