name: DHF Sync Bot

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  dhf-sync:
    name: Sync DHF from PR Impact Block
    runs-on: ubuntu-latest
    permissions:
      contents: write        # commit updated DHF docs back to the PR branch
      issues: write          # open review Issues for new hazards
      pull-requests: write   # post summary comment on the PR

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run DHF Sync Bot
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_BODY:           ${{ github.event.pull_request.body }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
        run: python scripts/dhf_sync_bot.py
        # Exit code 1 means new hazards were drafted — PR blocked pending review
        # Exit code 0 means all updates were clean (existing IDs only)
        continue-on-error: true
        id: sync

      - name: Commit DHF document updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(dhf): auto-update DHF from PR #${{ github.event.pull_request.number }} [skip ci]

            DHF Sync Bot updated:
            - dhf/03-design-inputs-outputs.md
            - dhf/02-risk-management-file.md
            - dhf/05-traceability-matrix.md
          file_pattern: "dhf/**/*.md"
          commit_user_name: "GreyZone AI DHF Bot"
          commit_user_email: "bot@greyzone-ai.com"

      - name: Run traceability check after sync
        run: python scripts/check_traceability.py

      - name: Block merge if new hazards require review
        if: steps.sync.outcome == 'failure'
        run: |
          echo "❌ New hazards were auto-drafted and require human review."
          echo "Complete the risk assessment in the GitHub Issues before merging."
          exit 1
