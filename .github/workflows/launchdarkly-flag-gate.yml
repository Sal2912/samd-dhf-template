name: LaunchDarkly Flag Enable Gate

# Blocks any PR that enables a LaunchDarkly flag until the
# corresponding DHF review Issue has been approved by @Sal2912.
#
# Engineers signal a flag-enable PR by adding:
#   LAUNCHDARKLY_FLAG: <flag-key>
#   STORY: DHF-42
# to their PR description.
#
# The gate checks:
#   1. The story's context file exists and status = "dhf-approved"
#   2. If not approved → PR is blocked with an explanation comment

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  flag-gate:
    name: DHF Flag Enable Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for flag-enable PR
        id: check
        env:
          PR_BODY:   ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PYEOF'
          import os, re, json, sys
          from pathlib import Path

          pr_body   = os.environ.get("PR_BODY", "")
          pr_number = os.environ.get("PR_NUMBER", "")
          gh_token  = os.environ.get("GITHUB_TOKEN", "")
          gh_repo   = os.environ.get("GITHUB_REPOSITORY", "")

          # Check if this is a flag-enable PR
          flag_match  = re.search(r"LAUNCHDARKLY_FLAG\s*:\s*(\S+)", pr_body, re.IGNORECASE)
          story_match = re.search(r"STORY\s*:\s*(DHF-\d+)", pr_body, re.IGNORECASE)

          if not flag_match:
              print("Not a flag-enable PR — gate not applicable.")
              sys.exit(0)

          flag_key = flag_match.group(1)
          story_id = story_match.group(1) if story_match else None

          print(f"Flag-enable PR detected: {flag_key} (Story: {story_id})")

          if not story_id:
              print("ERROR: LAUNCHDARKLY_FLAG present but no STORY: field found.")
              print("Add 'STORY: DHF-XX' to the PR description.")
              # Post comment
              import requests
              requests.post(
                  f"https://api.github.com/repos/{gh_repo}/issues/{pr_number}/comments",
                  headers={"Authorization": f"Bearer {gh_token}",
                           "Accept": "application/vnd.github+json"},
                  json={"body": (
                      "## ⛔ LaunchDarkly Flag Gate — Missing Story ID\n\n"
                      f"This PR enables LaunchDarkly flag `{flag_key}` but does not include "
                      "a `STORY: DHF-XX` field.\n\n"
                      "Add the Jira story ID to your PR description to link this flag enable "
                      "to its DHF change record."
                  )},
                  timeout=10,
              )
              sys.exit(1)

          # Check story context status
          ctx_path = Path(f"dhf/.story-context/{story_id}.json")
          if not ctx_path.exists():
              import requests
              requests.post(
                  f"https://api.github.com/repos/{gh_repo}/issues/{pr_number}/comments",
                  headers={"Authorization": f"Bearer {gh_token}",
                           "Accept": "application/vnd.github+json"},
                  json={"body": (
                      f"## ⛔ LaunchDarkly Flag Gate — No DHF Context Found\n\n"
                      f"Story **{story_id}** has no accumulated DHF context.\n\n"
                      f"Ensure all task PRs included `STORY: {story_id}` in their descriptions "
                      "and that the story has been marked Done in Jira."
                  )},
                  timeout=10,
              )
              sys.exit(1)

          ctx    = json.loads(ctx_path.read_text())
          status = ctx.get("status", "")

          if status == "dhf-approved":
              print(f"✅ DHF approved for {story_id}. Flag enable unblocked.")
              issue_url = ctx.get("issue_url", "")
              import requests
              requests.post(
                  f"https://api.github.com/repos/{gh_repo}/issues/{pr_number}/comments",
                  headers={"Authorization": f"Bearer {gh_token}",
                           "Accept": "application/vnd.github+json"},
                  json={"body": (
                      f"## ✅ LaunchDarkly Flag Gate — Approved\n\n"
                      f"DHF review for story **{story_id}** has been approved.\n"
                      f"Flag `{flag_key}` can be enabled. This PR is cleared to merge.\n\n"
                      f"DHF review record: {issue_url}"
                  )},
                  timeout=10,
              )
              sys.exit(0)
          else:
              issue_url = ctx.get("issue_url", "(Issue not yet created)")
              import requests
              requests.post(
                  f"https://api.github.com/repos/{gh_repo}/issues/{pr_number}/comments",
                  headers={"Authorization": f"Bearer {gh_token}",
                           "Accept": "application/vnd.github+json"},
                  json={"body": (
                      f"## ⛔ LaunchDarkly Flag Gate — DHF Review Pending\n\n"
                      f"Story **{story_id}** DHF review has not been approved yet.\n\n"
                      f"| Field | Status |\n|---|---|\n"
                      f"| Story | {story_id} |\n"
                      f"| Flag | `{flag_key}` |\n"
                      f"| DHF status | `{status}` |\n"
                      f"| Review Issue | {issue_url} |\n\n"
                      f"**@Sal2912** must comment `approved` on the DHF review Issue "
                      f"before this PR can merge.\n\n"
                      f"Review Issue: {issue_url}"
                  )},
                  timeout=10,
              )
              print(f"❌ DHF not yet approved for {story_id}. Status: {status}")
              sys.exit(1)
          PYEOF
