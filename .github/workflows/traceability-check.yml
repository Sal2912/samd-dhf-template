name: DHF Traceability Check

on:
  push:
    branches: [main]
    paths:
      - "dhf/**"
  pull_request:
    branches: [main]
    paths:
      - "dhf/**"

jobs:
  traceability:
    name: Validate DHF Traceability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run traceability check
        run: python scripts/check_traceability.py

      - name: Post summary to PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ DHF Traceability Check Failed\n\nOne or more traceability gaps were found in the DHF. Please review `dhf/05-traceability-matrix.md` and resolve all gaps before merging.\n\nSee the [Actions log](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.'
            })
